name: commitlint
on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  commitlint:
    name: Run commitlint
    uses: cffnpwr/actions/.github/workflows/commitlint.yaml@10384ba55626671f35459bc0ae86d72ff99951b4 # main
    permissions:
      contents: read
      actions: read
