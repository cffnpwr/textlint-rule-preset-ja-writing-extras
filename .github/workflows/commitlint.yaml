name: commitlint
on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  commitlint:
    name: Run commitlint
    uses: cffnpwr/actions/.github/workflows/commitlint.yaml@8e449128ae4f5b5bae3786ea93749991ebe33ae8 # main
    permissions:
      contents: read
      actions: read
