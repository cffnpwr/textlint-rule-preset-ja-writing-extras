name: Publish
on:
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions: {}

jobs:
  detect-package:
    name: Detect released package
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      dir: ${{ steps.detect.outputs.dir }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect package directory from release tag
        id: detect
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          for dir in packages/*/; do
            name="$(jq -r '.name' "${dir}package.json" | sed -E 's#^@[^/]+/##')"
            version="$(jq -r '.version' "${dir}package.json")"
            if [ "${name}-v${version}" = "$TAG" ]; then
              echo "dir=${dir%/}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "::error::No package under packages/* matches release tag ${TAG}"
          exit 1

  publish-npm:
    name: Publish to npm
    needs: detect-package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .tool-versions
          no-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "24.18.0"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Wait for workspace dependencies
        uses: ./.github/actions/wait-for-workspace-deps
        with:
          working-directory: ${{ needs.detect-package.outputs.dir }}

      - name: Apply publishConfig to manifest
        working-directory: ${{ needs.detect-package.outputs.dir }}
        run: |
          jq '.exports = .publishConfig.exports | del(.publishConfig)' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Pack
        id: pack
        working-directory: ${{ needs.detect-package.outputs.dir }}
        run: echo "tarball=$(bun pm pack --quiet | tail -n1)" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        working-directory: ${{ needs.detect-package.outputs.dir }}
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: npm publish "$TARBALL" --access public --provenance

  publish-jsr:
    name: Publish to JSR
    needs: detect-package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .tool-versions
          no-cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Wait for workspace dependencies
        uses: ./.github/actions/wait-for-workspace-deps
        with:
          working-directory: ${{ needs.detect-package.outputs.dir }}

      - name: Publish to JSR
        working-directory: ${{ needs.detect-package.outputs.dir }}
        run: bunx jsr publish
