name: Release Please
on:
  push:
    branches:
      - main

concurrency:
  group: >-
    ${{ github.workflow }}-
    ${{ github.repository }}-
    ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          permission-metadata: read
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          target-branch: ${{ github.ref_name }}
          config-file: .github/release-please/config.json
          manifest-file: .github/release-please/manifest.json

      # release-please は package.json を bump するが bun.lock は更新せず、
      # bun install もworkspaceパッケージの version を再同期しない。bun pm pack は
      # workspace:* を bun.lock の version で置換するため、同期しないと公開物の
      # パッケージ間依存が前バージョンを指す。リリースPRのブランチ上で同期する。
      - name: Checkout release PR branch
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: release-please--branches--${{ github.ref_name }}
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Sync bun.lock workspace versions
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: release-please--branches--${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          bash scripts/sync-lockfile-versions.sh
          if git diff --quiet -- bun.lock; then
            echo "bun.lock is already in sync"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "chore: sync bun.lock workspace versions"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "HEAD:${BRANCH}"
